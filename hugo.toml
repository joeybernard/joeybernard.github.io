[params]
  author = "Joey Bernard"
  info = "Full Stack DevOps and Other Weird Stuff"
  description = "Joey Bernard's personal website"
  keywords = "blog,developer,personal"
  avatarurl = "images/dragon_awen.png"
  #gravatar = "druid.bernard@gmail.com"

  faviconSVG = "/img/favicon.svg"
  favicon_32 = "/img/favicon-32x32.png"
  favicon_16 = "/img/favicon-16x16.png"

  since = 2026

  enableTwemoji = true

  colorScheme = "auto"
  hidecolorschemetoggle = false

  # customCSS = ["css/custom.css"]
